name: Weekly Content Agent Sync

on:
  schedule:
    # 03:30 UTC Monday = 09:00 IST Monday
    - cron: '30 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Pull fresh Instagram data
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          OWN_POSTS_LIMIT: '300'
        run: node scripts/fetch-data.js

      - name: Commit updated data.json
        run: |
          git config user.name "content-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard/data.json
          git diff --cached --quiet || git commit -m "Auto: refresh data.json"
          git push

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send-digest.js

      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
