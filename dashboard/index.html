<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crystra Diam — Content Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">◆</span>
    <div class="brand-text">
      <div class="brand-name">Crystra Diam</div>
      <div class="brand-sub">Content Agent</div>
    </div>
  </div>
  <div class="sync-pill" id="syncPill">
    <span class="dot"></span>
    <span id="syncText">Loading…</span>
  </div>
</header>

<section class="ticket" id="statsTicket" aria-label="Account stats"></section>

<main>
  <h2 class="section-label">The team</h2>
  <div class="agents-grid" id="agentsGrid"></div>
</main>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <button class="drawer-close" id="drawerClose" aria-label="Close">×</button>
  <div id="drawerContent"></div>
</aside>

<script src="agents.js"></script>
<script src="app.js"></script>
</body>
</html>
